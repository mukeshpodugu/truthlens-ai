version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: truthlens_postgres
    restart: always
    environment:
      POSTGRES_USER: truthlens_admin
      POSTGRES_PASSWORD: truthlens_password
      POSTGRES_DB: truthlens_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: truthlens_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build: ./backend
    container_name: truthlens_backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://truthlens_admin:truthlens_password@postgres:5432/truthlens_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretjwtkeyfortruthlensai2026!
      - ENVIRONMENT=production
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    container_name: truthlens_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
